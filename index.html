<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Alerts App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 <div class="container">
        <h1>🌤️ Weather Alerts by State</h1>
        <p class="subtitle">Enter a state abbreviation to view active weather alerts</p>
        
        <div class="search-section">
            <input type="text" id="state" placeholder="Enter state abbreviation" ...>
            <button id="fetch-alerts">Get Weather Alerts</button>
        </div>
        
        <div id="loading-indicator">
            <div class="spinner"></div>
            <p>Fetching weather alerts...</p>
        </div>
        
        <div id="error-message"></div>
        
        <div id="summary"></div>
        <div id="alerts-container"></div>
    </div>
  <script src="./index.js"></script>
</body>
</html>
